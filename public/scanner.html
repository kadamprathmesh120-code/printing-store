<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Document Scanner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="scanner-body">
<div id="topNotif" class="notif-bar"><span class="notif-text">For best print quality, use well-lit, high-resolution photos of your document.</span><button class="notif-close" onclick="dismissNotif()">&times;</button></div>

<div id="app">

  <!-- Step 1: Upload & Crop -->
  <div id="step1" class="scanner-step">
    <div class="scanner-header">
      <h1>Document Scanner</h1>
    </div>
    <div id="uploadArea" class="upload-area">
      <label for="scanInput" class="upload-label">
        <div class="upload-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p>Tap to upload a document photo</p>
        <small>JPG or PNG</small>
      </label>
      <input type="file" id="scanInput" accept="image/*" hidden>
    </div>

    <div id="cropContainer" class="hidden">
      <div class="crop-wrapper" id="cropWrapper">
        <canvas id="cropCanvas"></canvas>
        <canvas id="cropOverlay"></canvas>
      </div>
      <div id="cropStatus" class="crop-status">Adjust corners to match document edges</div>
      <div class="crop-toolbar">
        <button class="tool-btn" onclick="rotateScan(-90)" title="Rotate Left">&olarr;</button>
        <button class="tool-btn" onclick="autoDetect()" id="autoBtn">Auto</button>
        <button class="tool-btn" onclick="rotateScan(90)" title="Rotate Right">&orarr;</button>
        <button class="tool-btn confirm-btn" onclick="confirmCrop()">Next &rarr;</button>
      </div>
      <div id="cropError" class="crop-error hidden"></div>
    </div>
  </div>

  <!-- Step 2: Enhance -->
  <div id="step2" class="scanner-step hidden">
    <div class="scanner-header">
      <button class="back-btn" onclick="backToStep1()">&larr; Back</button>
      <h1>Enhance</h1>
    </div>
    <div class="preview-container" id="previewContainer">
      <canvas id="mainCanvas"></canvas>
      <div class="badge-overlay" id="filterBadge">Magic Color</div>
      <div class="compare-hint" id="compareHint">&#9679; Hold to compare</div>
    </div>
    <div class="filter-strip" id="filterStrip">
      <button class="filter-btn" data-filter="original" onclick="setFilter('original', this)">Original</button>
      <button class="filter-btn active" data-filter="magic" onclick="setFilter('magic', this)">Magic Color</button>
    </div>
    <div class="action-bar scan-action-bar">
      <button class="tool-btn" onclick="backToStep1()">&larr; Back</button>
      <button class="tool-btn confirm-btn" onclick="saveResult()" style="flex:2;">Save &rarr;</button>
    </div>
  </div>

  <!-- Step 3: Export -->
  <div id="step3" class="scanner-step hidden">
    <div class="scanner-header">
      <h1>Final Image</h1>
    </div>
    <div class="result-container">
      <img id="finalImage" class="result-img">
    </div>
    <div class="export-section">
      <button class="btn btn-primary" onclick="downloadAs('jpeg')">Download JPEG</button>
      <button class="btn btn-secondary" onclick="downloadAs('png')">Download PNG</button>
      <button class="btn btn-success" onclick="uploadScan()">Upload to Print Store</button>
      <button class="btn btn-secondary" onclick="resetScanner()">Scan Another</button>
      <div id="scanError" class="error" style="text-align:center;"></div>
    </div>
  </div>
</div>

<style>
.scanner-body { background:#121220; color:#fff; min-height:100vh; overscroll-behavior:none; }
.scanner-step { max-width:520px; margin:0 auto; padding:0 0 24px; }
.scanner-header { display:flex; align-items:center; gap:10px; padding:14px 16px; background:#1a1a2e; border-bottom:1px solid #2a2a3e; }
.scanner-header h1 { font-size:1.1em; margin:0; flex:1; font-weight:700; }
.back-btn { background:none; border:none; color:#fff; font-size:1.1em; cursor:pointer; padding:4px 8px; }

.upload-area { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:320px; background:#1a1a2e; border:2px dashed #2a2a3e; border-radius:16px; margin:16px; cursor:pointer; transition:all .2s; }
.upload-area:active { border-color:#1a73e8; background:#1e1e32; }
.upload-label { display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; width:100%; padding:40px 20px; }
.upload-icon { width:64px; height:64px; border-radius:50%; background:rgba(26,115,232,0.12); display:flex; align-items:center; justify-content:center; }
.upload-area p { font-size:1.1em; color:#1a73e8; margin:4px 0 0; font-weight:600; }
.upload-area small { color:#6b7280; }

.crop-wrapper { position:relative; margin:8px; border-radius:8px; overflow:hidden; background:#000; display:flex; justify-content:center; }
.crop-wrapper canvas { display:block; max-width:100%; position:absolute; top:0; left:0; }
#cropCanvas { position:relative !important; }
#cropOverlay { pointer-events:none; }
.crop-status { text-align:center; font-size:0.78em; color:#6b7280; padding:4px 16px; }
.crop-error { text-align:center; font-size:0.82em; color:#ef4444; padding:4px 16px; }
.crop-toolbar { display:flex; justify-content:center; gap:10px; padding:10px 16px; flex-wrap:wrap; }
.tool-btn { background:#1e1e32; border:1px solid #2a2a3e; color:#fff; padding:12px 20px; border-radius:10px; font-size:0.92em; cursor:pointer; font-family:inherit; transition:all .15s; min-height:44px; -webkit-tap-highlight-color:transparent; }
.tool-btn:active { transform:scale(0.96); background:#2a2a3e; }
.tool-btn.confirm-btn { background:#16A34A; border-color:#16A34A; font-weight:700; }

#previewContainer { margin:8px; border-radius:10px; overflow:hidden; background:#000; position:relative; display:flex; justify-content:center; }
#previewContainer canvas { display:block; max-width:100%; }
.badge-overlay { position:absolute; top:10px; right:10px; background:rgba(22,163,74,0.85); color:#fff; padding:4px 12px; border-radius:16px; font-size:0.72em; font-weight:700; pointer-events:none; transition:opacity .2s; }
.compare-hint { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.6); color:#fff; padding:4px 12px; border-radius:12px; font-size:0.68em; pointer-events:none; transition:opacity .3s; white-space:nowrap; }

.filter-strip { display:flex; gap:8px; padding:12px 16px; justify-content:center; }
.filter-btn { flex:1; max-width:200px; padding:12px; border-radius:12px; font-size:0.88em; font-weight:600; cursor:pointer; font-family:inherit; border:2px solid #2a2a3e; background:#1e1e32; color:#9ca3af; transition:all .2s; -webkit-tap-highlight-color:transparent; }
.filter-btn:active { transform:scale(0.97); }
.filter-btn.active { border-color:#16A34A; background:rgba(22,163,74,0.12); color:#16A34A; }

.scan-action-bar { display:flex; gap:10px; padding:10px 16px; }
.scan-action-bar .tool-btn { flex:1; }

.result-container { margin:12px 16px; border-radius:10px; overflow:hidden; background:#000; display:flex; justify-content:center; }
.result-img { max-width:100%; display:block; }
.export-section { padding:0 16px 24px; display:flex; flex-direction:column; gap:10px; }
.export-section .btn { margin:0; }

.hidden { display:none !important; }
@media (max-width:480px) {
  .upload-area { min-height:260px; margin:10px; }
  .crop-wrapper { margin:4px; }
  .tool-btn { font-size:0.85em; padding:10px 14px; min-height:40px; }
  .filter-btn { padding:10px; font-size:0.82em; }
  .filter-strip { padding:8px 10px; gap:6px; }
}
</style>

<script>
// ============================================================
// STATE
// ============================================================
var sourceImage = null;
var croppedImage = null;
var processedBlob = null;
var activeFile = null;
var currentFilter = 'magic';
var rotation = 0;
var wipMagicData = null; // cache magic-processed data for quick toggle

// Crop state
var corners = null; // [{x,y},...] in original image space (TL,TR,BR,BL)
var allCorners = null; // copy for adjustment
var displayCorners = null; // in canvas space
var canvasCropObj = null;

// Crop interaction
var dragHandle = null;
var dragStart = null;

// ============================================================
// INIT
// ============================================================
document.getElementById('scanInput').addEventListener('change', function(e) {
  if (e.target.files && e.target.files[0]) {
    activeFile = e.target.files[0];
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        sourceImage = img;
        rotation = 0;
        corners = null;
        initCrop();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
  }
});

// ============================================================
// CROP STAGE
// ============================================================
function getScaledDims(img, maxW, maxH) {
  var w = img.width, h = img.height;
  if (w > maxW) { h = h * maxW / w; w = maxW; }
  if (h > maxH) { w = w * maxH / h; h = maxH; }
  return { width: Math.round(w), height: Math.round(h) };
}

function initCrop() {
  document.getElementById('uploadArea').classList.add('hidden');
  document.getElementById('cropContainer').classList.remove('hidden');
  document.getElementById('cropError').classList.add('hidden');
  document.getElementById('cropStatus').textContent = 'Detecting document edges...';

  var canvas = document.getElementById('cropCanvas');
  var container = document.querySelector('.crop-wrapper');
  var maxW = Math.min(container.clientWidth, 700);
  var maxH = window.innerHeight * 0.55;
  var dims = getScaledDims(sourceImage, maxW, maxH);
  canvas.width = dims.width;
  canvas.height = dims.height;

  var overlay = document.getElementById('cropOverlay');
  overlay.width = dims.width;
  overlay.height = dims.height;

  drawImageOnCanvas(canvas, sourceImage);
  autoDetectCorners(function(detected) {
    if (detected && detected.length === 4) {
      corners = detected;
      document.getElementById('cropStatus').textContent = 'Corners detected. Adjust if needed, then tap Next.';
    } else {
      corners = [
        { x: 0.05 * sourceImage.width, y: 0.05 * sourceImage.height },
        { x: 0.95 * sourceImage.width, y: 0.05 * sourceImage.height },
        { x: 0.95 * sourceImage.width, y: 0.95 * sourceImage.height },
        { x: 0.05 * sourceImage.width, y: 0.95 * sourceImage.height }
      ];
      document.getElementById('cropStatus').textContent = 'Auto-detect did not find clear edges. Drag corners manually.';
    }
    drawCropOverlay();
  });
}

function drawImageOnCanvas(canvas, img) {
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
}

function drawCropOverlay() {
  if (!corners || corners.length !== 4) return;
  var canvas = document.getElementById('cropCanvas');
  var overlay = document.getElementById('cropOverlay');
  var w = canvas.width, h = canvas.height;
  var ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  // Convert corners from image space to canvas space
  displayCorners = corners.map(function(c) {
    return { x: c.x / sourceImage.width * w, y: c.y / sourceImage.height * h };
  });

  // Dim outside the quadrilateral
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.rect(0, 0, w, h);
  ctx.moveTo(displayCorners[0].x, displayCorners[0].y);
  ctx.lineTo(displayCorners[1].x, displayCorners[1].y);
  ctx.lineTo(displayCorners[2].x, displayCorners[2].y);
  ctx.lineTo(displayCorners[3].x, displayCorners[3].y);
  ctx.closePath();
  ctx.fill('evenodd');

  // Draw quadrilateral outline
  ctx.strokeStyle = '#1a73e8';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.moveTo(displayCorners[0].x, displayCorners[0].y);
  ctx.lineTo(displayCorners[1].x, displayCorners[1].y);
  ctx.lineTo(displayCorners[2].x, displayCorners[2].y);
  ctx.lineTo(displayCorners[3].x, displayCorners[3].y);
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw corner handles
  var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  var hs = Math.max(isTouch ? 20 : 14, 18);
  var colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A'];
  for (var i = 0; i < 4; i++) {
    var hx = displayCorners[i].x, hy = displayCorners[i].y;
    ctx.beginPath();
    ctx.arc(hx, hy, hs, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.strokeStyle = colors[i];
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(hx, hy, 4, 0, Math.PI * 2);
    ctx.fillStyle = colors[i];
    ctx.fill();
  }
}

// ---- Mouse/Touch crop interaction ----
var cropCanvas = document.getElementById('cropCanvas');
cropCanvas.addEventListener('mousedown', onCropDown);
cropCanvas.addEventListener('mousemove', onCropMove);
cropCanvas.addEventListener('mouseup', onCropUp);
cropCanvas.addEventListener('mouseleave', onCropUp);
cropCanvas.addEventListener('touchstart', function(e) { e.preventDefault(); onCropDown(e); }, { passive: false });
cropCanvas.addEventListener('touchmove', function(e) { e.preventDefault(); onCropMove(e); }, { passive: false });
cropCanvas.addEventListener('touchend', function(e) { e.preventDefault(); onCropUp(e); }, { passive: false });

function getCanvasPos(e) {
  var rect = cropCanvas.getBoundingClientRect();
  var clientX, clientY;
  if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
  else { clientX = e.clientX; clientY = e.clientY; }
  return {
    x: (clientX - rect.left) * (cropCanvas.width / rect.width),
    y: (clientY - rect.top) * (cropCanvas.height / rect.height)
  };
}

function getCornerHandle(pos) {
  if (!displayCorners) return -1;
  var threshold = ('ontouchstart' in window || navigator.maxTouchPoints > 0) ? 40 : 25;
  for (var i = 0; i < 4; i++) {
    var d = Math.sqrt((pos.x - displayCorners[i].x) ** 2 + (pos.y - displayCorners[i].y) ** 2);
    if (d < threshold) return i;
  }
  return -1;
}

function isInsideQuad(pos) {
  if (!displayCorners) return false;
  function cross(o, a, b) { return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x); }
  var inside = false;
  for (var i = 0, j = 3; i < 4; j = i++) {
    if ((displayCorners[i].y > pos.y) !== (displayCorners[j].y > pos.y) &&
        pos.x < (displayCorners[j].x - displayCorners[i].x) * (pos.y - displayCorners[i].y) / (displayCorners[j].y - displayCorners[i].y) + displayCorners[i].x) {
      inside = !inside;
    }
  }
  return inside;
}

function onCropDown(e) {
  if (!displayCorners) return;
  var pos = getCanvasPos(e);
  var idx = getCornerHandle(pos);
  if (idx >= 0) {
    dragHandle = idx;
    dragStart = { x: pos.x, y: pos.y, corners: displayCorners.map(function(c) { return {x:c.x, y:c.y}; }) };
    cropCanvas.style.cursor = 'grabbing';
    return;
  }
  if (isInsideQuad(pos)) {
    dragHandle = 'move';
    dragStart = { x: pos.x, y: pos.y, corners: displayCorners.map(function(c) { return {x:c.x, y:c.y}; }) };
    cropCanvas.style.cursor = 'move';
  }
}

function onCropMove(e) {
  if (!displayCorners) return;
  if (dragHandle === null) {
    var pos = getCanvasPos(e);
    var idx = getCornerHandle(pos);
    cropCanvas.style.cursor = idx >= 0 ? 'grab' : (isInsideQuad(pos) ? 'move' : 'default');
    return;
  }
  var pos = getCanvasPos(e);
  var dx = pos.x - dragStart.x;
  var dy = pos.y - dragStart.y;
  var cw = cropCanvas.width, ch = cropCanvas.height;
  var sw = sourceImage.width, sh = sourceImage.height;

  if (dragHandle === 'move') {
    for (var i = 0; i < 4; i++) {
      displayCorners[i] = {
        x: Math.max(0, Math.min(cw, dragStart.corners[i].x + dx)),
        y: Math.max(0, Math.min(ch, dragStart.corners[i].y + dy))
      };
    }
  } else {
    displayCorners[dragHandle] = {
      x: Math.max(0, Math.min(cw, dragStart.corners[dragHandle].x + dx)),
      y: Math.max(0, Math.min(ch, dragStart.corners[dragHandle].y + dy))
    };
  }
  corners = displayCorners.map(function(c) {
    return { x: c.x / cw * sw, y: c.y / ch * sh };
  });
  drawCropOverlay();
}

function onCropUp(e) {
  dragHandle = null;
  dragStart = null;
  cropCanvas.style.cursor = 'default';
}

// ---- Auto edge detection (reuse pure JS from opencv-crop.js) ----
function autoDetect() {
  var btn = document.getElementById('autoBtn');
  btn.textContent = 'Detecting...';
  btn.disabled = true;
  autoDetectCorners(function(detected) {
    if (detected && detected.length === 4) {
      corners = detected;
      document.getElementById('cropStatus').textContent = 'Corners updated.';
    } else {
      document.getElementById('cropStatus').textContent = 'Could not detect edges. Adjust manually.';
    }
    drawCropOverlay();
    btn.textContent = 'Auto';
    btn.disabled = false;
  });
}

function autoDetectCorners(callback) {
  if (!sourceImage) { callback(null); return; }
  var iw = sourceImage.width, ih = sourceImage.height;
  if (iw < 20 || ih < 20) { callback(null); return; }

  var detected = findDocumentCorners(sourceImage);
  callback(detected);
}

function detectEdgesPure(data, w, h) {
  var gray = new Float32Array(w * h);
  for (var i = 0; i < w * h; i++) { gray[i] = data[i*4] * 0.299 + data[i*4+1] * 0.587 + data[i*4+2] * 0.114; }
  var blurred = new Float32Array(w * h);
  for (var y = 1; y < h-1; y++) {
    for (var x = 1; x < w-1; x++) {
      blurred[y*w+x] = (gray[(y-1)*w+x-1] + gray[(y-1)*w+x] + gray[(y-1)*w+x+1] + gray[y*w+x-1] + gray[y*w+x] + gray[y*w+x+1] + gray[(y+1)*w+x-1] + gray[(y+1)*w+x] + gray[(y+1)*w+x+1]) / 9;
    }
  }
  var edges = new Float32Array(w * h);
  var maxEdge = 0;
  for (var y = 1; y < h-1; y++) {
    for (var x = 1; x < w-1; x++) {
      var gx = -blurred[(y-1)*w+x-1] + blurred[(y-1)*w+x+1] - 2*blurred[y*w+x-1] + 2*blurred[y*w+x+1] - blurred[(y+1)*w+x-1] + blurred[(y+1)*w+x+1];
      var gy = -blurred[(y-1)*w+x-1] - 2*blurred[(y-1)*w+x] - blurred[(y-1)*w+x+1] + blurred[(y+1)*w+x-1] + 2*blurred[(y+1)*w+x] + blurred[(y+1)*w+x+1];
      edges[y*w+x] = Math.sqrt(gx*gx + gy*gy);
      if (edges[y*w+x] > maxEdge) maxEdge = edges[y*w+x];
    }
  }
  return { edges: edges, maxEdge: maxEdge };
}

function orderCorners(pts) {
  if (pts.length !== 4) return pts;
  var cx = 0, cy = 0;
  for (var i = 0; i < 4; i++) { cx += pts[i].x; cy += pts[i].y; }
  cx /= 4; cy /= 4;
  pts.sort(function(a, b) { return Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx); });
  var minSum = Infinity, tlIdx = 0;
  for (var i = 0; i < 4; i++) { var s = pts[i].x + pts[i].y; if (s < minSum) { minSum = s; tlIdx = i; } }
  var ordered = [];
  for (var i = 0; i < 4; i++) ordered.push(pts[(tlIdx + i) % 4]);
  var sa = 0;
  for (var i = 0; i < 4; i++) { var j = (i + 1) % 4; sa += (ordered[i].x * ordered[j].y - ordered[j].x * ordered[i].y); }
  if (sa < 0) { var tmp = ordered[1]; ordered[1] = ordered[3]; ordered[3] = tmp; }
  return ordered;
}

function isConvex(pts) {
  if (pts.length < 3) return false;
  var sign = 0;
  for (var i = 0; i < pts.length; i++) {
    var j = (i+1) % pts.length, k = (i+2) % pts.length;
    var cross = (pts[j].x - pts[i].x) * (pts[k].y - pts[j].y) - (pts[j].y - pts[i].y) * (pts[k].x - pts[j].x);
    if (cross !== 0) { if (sign === 0) sign = cross > 0 ? 1 : -1; else if ((cross > 0 ? 1 : -1) !== sign) return false; }
  }
  return true;
}

function findDocumentCorners(img) {
  var iw = img.width, ih = img.height;
  // Always process at a reasonable detection resolution
  var detMaxDim = 1200;
  var scale = Math.min(detMaxDim / iw, detMaxDim / ih, 1);
  var sw = Math.round(iw * scale), sh = Math.round(ih * scale);
  var tc = document.createElement('canvas');
  tc.width = sw; tc.height = sh;
  var tctx = tc.getContext('2d');
  tctx.imageSmoothingQuality = 'high';
  tctx.drawImage(img, 0, 0, sw, sh);
  var data = tctx.getImageData(0, 0, sw, sh).data;
  var e = detectEdgesPure(data, sw, sh);
  var edges = e.edges, maxEdge = e.maxEdge;
  var threshold = maxEdge * 0.15;
  var margin = Math.round(Math.min(sw, sh) * 0.05);
  var searchEndX = sw - margin, searchEndY = sh - margin;
  var topPts=[], bottomPts=[], leftPts=[], rightPts=[];

  for (var x = margin; x < searchEndX; x += 2) {
    for (var y = margin; y < searchEndY; y++) { if (edges[y*sw+x] > threshold) { topPts.push({x:x,y:y}); break; } }
    for (var y = searchEndY-1; y >= margin; y--) { if (edges[y*sw+x] > threshold) { bottomPts.push({x:x,y:y}); break; } }
  }
  for (var y = margin; y < searchEndY; y += 2) {
    for (var x = margin; x < searchEndX; x++) { if (edges[y*sw+x] > threshold) { leftPts.push({x:x,y:y}); break; } }
    for (var x = searchEndX-1; x >= margin; x--) { if (edges[y*sw+x] > threshold) { rightPts.push({x:x,y:y}); break; } }
  }
  if (topPts.length < 8 || bottomPts.length < 8 || leftPts.length < 8 || rightPts.length < 8) return null;

  function fitLine(pts, axis) {
    var weights = new Array(pts.length);
    for (var iter = 0; iter < 3; iter++) {
      var sumW = 0, sumX = 0, sumY = 0, sumXX = 0, sumXY = 0;
      for (var i = 0; i < pts.length; i++) {
        var wgt = weights[i] !== undefined ? weights[i] : 1;
        sumW += wgt; sumX += pts[i].x * wgt; sumY += pts[i].y * wgt; sumXX += pts[i].x * pts[i].x * wgt; sumXY += pts[i].x * pts[i].y * wgt;
      }
      var slope = (sumW * sumXY - sumX * sumY) / (sumW * sumXX - sumX * sumX);
      var intercept = (sumY - slope * sumX) / sumW;
      var dists = [];
      for (var i = 0; i < pts.length; i++) {
        var pred = slope * pts[i].x + intercept;
        dists.push(Math.abs(axis === 'x' ? (pts[i].y - pred) : (pts[i].y - pred)));
      }
      dists.sort(function(a,b) { return a-b; });
      var medianDist = dists[Math.floor(dists.length/2)] || 1;
      for (var i = 0; i < pts.length; i++) {
        var pred = slope * pts[i].x + intercept;
        var dist = Math.abs(axis === 'x' ? (pts[i].y - pred) : (pts[i].y - pred));
        weights[i] = dist < medianDist * 3 ? 1 : 0;
      }
    }
    return { slope: slope, intercept: intercept };
  }

  var topLine = fitLine(topPts, 'x');
  var bottomLine = fitLine(bottomPts, 'x');
  var leftData = leftPts.map(function(p) { return {x: p.y, y: p.x}; });
  var rightData = rightPts.map(function(p) { return {x: p.y, y: p.x}; });
  var leftLine = fitLine(leftData, 'x');
  var rightLine = fitLine(rightData, 'x');

  function intersect(hLine, vLine_swapped) {
    var m1 = hLine.slope, b1 = hLine.intercept;
    var m2 = vLine_swapped.slope, b2 = vLine_swapped.intercept;
    var denom = 1 - m1 * m2;
    if (Math.abs(denom) < 0.001) denom = 0.001;
    var ix = (b1 * m2 + b2) / denom;
    var iy = m1 * ix + b1;
    return { x: Math.max(0, Math.min(sw-1, ix)), y: Math.max(0, Math.min(sh-1, iy)) };
  }

  var tl = intersect(topLine, leftLine);
  var tr = intersect(topLine, rightLine);
  var bl = intersect(bottomLine, leftLine);
  var br = intersect(bottomLine, rightLine);
  var raw = orderCorners([tl, tr, br, bl]);
  if (!isConvex(raw)) return null;
  var area = Math.abs((raw[1].x-raw[0].x)*(raw[2].y-raw[0].y) - (raw[2].x-raw[0].x)*(raw[1].y-raw[0].y));
  if (area < sw*sh*0.02) return null;

  return raw.map(function(p) { return { x: Math.round(p.x / scale), y: Math.round(p.y / scale) }; });
}

// ---- Rotation ----
function rotateScan(deg) {
  if (!sourceImage) return;
  rotation = (rotation + deg) % 360;
  var canvas = document.getElementById('cropCanvas');
  var ctx = canvas.getContext('2d');
  var tempC = document.createElement('canvas');
  var tCtx = tempC.getContext('2d');
  if (rotation % 180 !== 0) { tempC.width = canvas.height; tempC.height = canvas.width; }
  else { tempC.width = canvas.width; tempC.height = canvas.height; }
  tCtx.translate(tempC.width / 2, tempC.height / 2);
  tCtx.rotate(deg * Math.PI / 180);
  tCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
  canvas.width = tempC.width; canvas.height = tempC.height;
  ctx.drawImage(tempC, 0, 0);

  // Scale corners
  if (corners && corners.length === 4) {
    corners = corners.map(function(c) {
      var cx = sourceImage.width / 2, cy = sourceImage.height / 2;
      var rad = deg * Math.PI / 180;
      var cos = Math.cos(rad), sin = Math.sin(rad);
      var dx = c.x - cx, dy = c.y - cy;
      return { x: Math.max(0, Math.min(sourceImage.width, cx + dx*cos - dy*sin)), y: Math.max(0, Math.min(sourceImage.height, cy + dx*sin + dy*cos)) };
    });
  }
  var overlay = document.getElementById('cropOverlay');
  overlay.width = canvas.width; overlay.height = canvas.height;
  drawCropOverlay();
}

// ---- Perspective Transform ----
function applyPerspective(srcData, srcW, srcH, corners, dstW, dstH) {
  if (!corners || corners.length !== 4) return null;
  var dst = new Uint8ClampedArray(dstW * dstH * 4);
  var tl = corners[0], tr = corners[1], br = corners[2], bl = corners[3];
  for (var dy = 0; dy < dstH; dy++) {
    for (var dx = 0; dx < dstW; dx++) {
      var u = dx / (dstW - 1 || 1);
      var v = dy / (dstH - 1 || 1);
      var topX = tl.x + (tr.x - tl.x) * u;
      var topY = tl.y + (tr.y - tl.y) * u;
      var botX = bl.x + (br.x - bl.x) * u;
      var botY = bl.y + (br.y - bl.y) * u;
      var sx = topX + (botX - topX) * v;
      var sy = topY + (botY - topY) * v;
      var ix = Math.floor(sx), iy = Math.floor(sy);
      var fx = sx - ix, fy = sy - iy;
      ix = Math.max(0, Math.min(srcW - 2, ix));
      iy = Math.max(0, Math.min(srcH - 2, iy));
      var idx00 = (iy * srcW + ix) * 4;
      var idx10 = (iy * srcW + ix + 1) * 4;
      var idx01 = ((iy + 1) * srcW + ix) * 4;
      var idx11 = ((iy + 1) * srcW + ix + 1) * 4;
      for (var c = 0; c < 4; c++) {
        dst[(dy * dstW + dx) * 4 + c] = srcData[idx00+c] * (1-fx)*(1-fy) + srcData[idx10+c] * fx*(1-fy) + srcData[idx01+c] * (1-fx)*fy + srcData[idx11+c] * fx*fy;
      }
    }
  }
  return dst;
}

// ---- Confirm Crop (Step 1 -> Step 2) ----
function confirmCrop() {
  if (!sourceImage || !corners || corners.length !== 4) {
    document.getElementById('cropError').textContent = 'Please adjust the crop corners.';
    document.getElementById('cropError').classList.remove('hidden');
    return;
  }
  document.getElementById('cropError').classList.add('hidden');

  var iw = sourceImage.width, ih = sourceImage.height;
  var cw = Math.max(distance(corners[0], corners[1]), distance(corners[3], corners[2]));
  var ch = Math.max(distance(corners[0], corners[3]), distance(corners[1], corners[2]));
  if (cw < 10 || ch < 10) { document.getElementById('cropError').textContent = 'Crop area too small.'; document.getElementById('cropError').classList.remove('hidden'); return; }

  var outW = Math.round(cw), outH = Math.round(ch);

  // Get full-resolution source data
  var tempC = document.createElement('canvas');
  tempC.width = iw; tempC.height = ih;
  var tcCtx = tempC.getContext('2d');
  tcCtx.imageSmoothingQuality = 'high';
  tcCtx.drawImage(sourceImage, 0, 0);
  var srcData = tcCtx.getImageData(0, 0, iw, ih).data;

  // Apply perspective correction at full resolution
  var corrected = applyPerspective(srcData, iw, ih, corners, outW, outH);
  if (!corrected) { document.getElementById('cropError').textContent = 'Perspective correction failed.'; document.getElementById('cropError').classList.remove('hidden'); return; }

  var finalC = document.createElement('canvas');
  finalC.width = outW; finalC.height = outH;
  var fCtx = finalC.getContext('2d');
  var imageData = fCtx.createImageData(outW, outH);
  imageData.data.set(corrected);
  fCtx.putImageData(imageData, 0, 0);

  finalC.toBlob(function(blob) {
    var img = new Image();
    img.onload = function() {
      croppedImage = img;
      wipMagicData = null;
      showStep2();
    };
    img.src = URL.createObjectURL(blob);
  }, 'image/png');
}

function distance(a, b) { return Math.sqrt((a.x-b.x)*(a.x-b.x) + (a.y-b.y)*(a.y-b.y)); }

// ============================================================
// STEP 2: ENHANCE
// ============================================================
function showStep2() {
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
  var canvas = document.getElementById('mainCanvas');
  var container = document.getElementById('previewContainer');
  var maxW = Math.min(container.clientWidth, 700);
  var maxH = window.innerHeight * 0.5;
  var dims = getScaledDims(croppedImage, maxW, maxH);
  canvas.width = dims.width;
  canvas.height = dims.height;

  currentFilter = 'magic';
  applyFilter();
  updateBadge();
}

function setFilter(filter, btn) {
  if (filter === currentFilter) return;
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  applyFilter();
  updateBadge();
}

function updateBadge() {
  document.getElementById('filterBadge').textContent = currentFilter === 'magic' ? 'Magic Color' : 'Original';
}

function applyFilter() {
  var canvas = document.getElementById('mainCanvas');
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(croppedImage, 0, 0, w, h);

  if (currentFilter === 'magic') {
    if (wipMagicData) {
      ctx.putImageData(wipMagicData, 0, 0);
    } else {
      var t0 = performance.now();
      magicColorPipeline(ctx, w, h);
      wipMagicData = ctx.getImageData(0, 0, w, h);
    }
  }
}

// ---- Before/After toggle (hold to compare) ----
var previewContainer = document.getElementById('previewContainer');
var compareActive = false;

previewContainer.addEventListener('mousedown', function() { if (currentFilter === 'magic') showOriginal(); });
previewContainer.addEventListener('mouseup', function() { if (currentFilter === 'magic') showMagic(); });
previewContainer.addEventListener('mouseleave', function() { if (currentFilter === 'magic') showMagic(); });
previewContainer.addEventListener('touchstart', function(e) { if (currentFilter === 'magic') { e.preventDefault(); showOriginal(); } }, { passive: false });
previewContainer.addEventListener('touchend', function(e) { if (currentFilter === 'magic') showMagic(); }, { passive: false });
previewContainer.addEventListener('touchcancel', function() { if (currentFilter === 'magic') showMagic(); });

function showOriginal() {
  if (compareActive) return;
  compareActive = true;
  var canvas = document.getElementById('mainCanvas');
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(croppedImage, 0, 0, canvas.width, canvas.height);
  document.getElementById('filterBadge').textContent = 'Original';
  document.getElementById('compareHint').style.opacity = '0';
}

function showMagic() {
  if (!compareActive) return;
  compareActive = false;
  applyFilter();
  updateBadge();
  document.getElementById('compareHint').style.opacity = '1';
}

// ============================================================
// MAGIC COLOR PIPELINE
// ============================================================
function magicColorPipeline(ctx, w, h) {
  var imageData = ctx.getImageData(0, 0, w, h);
  var d = imageData.data;
  var len = w * h;

  // 1. Gray World White Balance
  var sumR = 0, sumG = 0, sumB = 0;
  for (var i = 0; i < len * 4; i += 4) { sumR += d[i]; sumG += d[i+1]; sumB += d[i+2]; }
  var avgR = sumR / len, avgG = sumG / len, avgB = sumB / len;
  var avgAll = (avgR + avgG + avgB) / 3;
  var sr = avgAll / (avgR || 1), sg = avgAll / (avgG || 1), sb = avgAll / (avgB || 1);
  for (var i = 0; i < len * 4; i += 4) {
    d[i] = Math.min(255, d[i] * sr);
    d[i+1] = Math.min(255, d[i+1] * sg);
    d[i+2] = Math.min(255, d[i+2] * sb);
  }

  // 2. Extract luminance
  var lum = new Float32Array(len);
  for (var i = 0; i < len; i++) { var idx = i * 4; lum[i] = d[idx] * 0.299 + d[idx+1] * 0.587 + d[idx+2] * 0.114; }

  // 3. Background estimation (large box blur) for shadow removal
  var bgRadius = Math.max(3, Math.round(Math.min(w, h) * 0.03));
  if (bgRadius % 2 === 0) bgRadius++;
  var bg = boxBlur(lum, w, h, bgRadius);

  // 4. Shadow removal & adaptive brightness
  var globalTarget = Math.min(235, Math.max(200, percentile(lum, len, 0.85)));
  for (var i = 0; i < len; i++) {
    var b = bg[i];
    var scale = b > 8 ? globalTarget / b : 1.0;
    scale = Math.max(0.3, Math.min(3.0, scale));
    d[i*4] = Math.min(255, Math.max(0, d[i*4] * scale));
    d[i*4+1] = Math.min(255, Math.max(0, d[i*4+1] * scale));
    d[i*4+2] = Math.min(255, Math.max(0, d[i*4+2] * scale));
  }

  // Recompute luminance after correction
  for (var i = 0; i < len; i++) { var idx = i * 4; lum[i] = d[idx] * 0.299 + d[idx+1] * 0.587 + d[idx+2] * 0.114; }

  // 5. CLAHE on luminance
  var claheMap = clahe(lum, w, h, 2.0, Math.round(Math.min(w, h) / 16));

  // 6. Blend CLAHE result with original luminance (preserve natural look)
  for (var i = 0; i < len; i++) {
    var origLum = lum[i];
    var enhanced = claheMap[i];
    var blended = origLum * 0.15 + enhanced * 0.85;
    if (origLum > 240) blended = origLum * 0.5 + enhanced * 0.5; // preserve very bright areas
    if (origLum < 30) blended = origLum * 0.3 + enhanced * 0.7; // lift dark areas slightly
    var ratio = blended / (origLum || 1);
    d[i*4] = Math.min(255, Math.max(0, d[i*4] * ratio));
    d[i*4+1] = Math.min(255, Math.max(0, d[i*4+1] * ratio));
    d[i*4+2] = Math.min(255, Math.max(0, d[i*4+2] * ratio));
  }

  // 7. Unsharp mask sharpening
  var blurRadius = Math.max(1, Math.round(Math.min(w, h) * 0.002));
  var blurKernel = generateGaussianKernel(blurRadius);
  var blurred = convolutionFloat(lum, w, h, blurKernel, blurRadius);
  var sharpenAmount = 1.8;
  for (var i = 0; i < len; i++) {
    var diff = lum[i] - blurred[i];
    // Apply sharpening more to mid-tones, less to dark shadows and bright highlights
    var factor = 1.0;
    if (lum[i] < 30) factor = 0.3;
    else if (lum[i] > 230) factor = 0.5;
    var adj = diff * sharpenAmount * factor;
    for (var c = 0; c < 3; c++) {
      d[i*4+c] = Math.min(255, Math.max(0, d[i*4+c] + adj));
    }
  }

  // 8. White background push
  for (var i = 0; i < len; i++) {
    var r = d[i*4], g = d[i*4+1], b = d[i*4+2];
    var minChan = Math.min(r, g, b);
    if (minChan > 210) {
      var push = (minChan - 210) / 45;
      push = Math.min(1, push);
      d[i*4] = Math.min(255, r + (255 - r) * push);
      d[i*4+1] = Math.min(255, g + (255 - g) * push);
      d[i*4+2] = Math.min(255, b + (255 - b) * push);
    }
  }

  // 9. Gentle saturation boost to preserve color content
  for (var i = 0; i < len; i++) {
    var r = d[i*4], g = d[i*4+1], b = d[i*4+2];
    var avg = (r + g + b) / 3;
    var sat = 1.15;
    d[i*4] = Math.min(255, Math.max(0, avg + (r - avg) * sat));
    d[i*4+1] = Math.min(255, Math.max(0, avg + (g - avg) * sat));
    d[i*4+2] = Math.min(255, Math.max(0, avg + (b - avg) * sat));
  }

  // 10. Noise reduction (gentle median filter for chrominance, preserve edges)
  medianFilterChroma(d, w, h, 1);

  ctx.putImageData(imageData, 0, 0);
}

// ---- Helper: box blur ----
function boxBlur(src, w, h, radius) {
  var dst = new Float32Array(w * h);
  var r = Math.floor(radius / 2);
  // Horizontal pass
  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      var sum = 0, count = 0;
      for (var kx = -r; kx <= r; kx++) {
        var px = x + kx;
        if (px >= 0 && px < w) { sum += src[y * w + px]; count++; }
      }
      dst[y * w + x] = sum / count;
    }
  }
  // Vertical pass
  var result = new Float32Array(w * h);
  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      var sum = 0, count = 0;
      for (var ky = -r; ky <= r; ky++) {
        var py = y + ky;
        if (py >= 0 && py < h) { sum += dst[py * w + x]; count++; }
      }
      result[y * w + x] = sum / count;
    }
  }
  return result;
}

// ---- Helper: percentile ----
function percentile(arr, len, p) {
  var sorted = new Float32Array(arr);
  sorted.sort(function(a, b) { return a - b; });
  return sorted[Math.floor((len - 1) * p)];
}

// ---- CLAHE (simplified tile-based) ----
function clahe(src, w, h, clipLimit, tileSize) {
  tileSize = Math.max(8, Math.min(tileSize, 128));
  var tilesX = Math.ceil(w / tileSize);
  var tilesY = Math.ceil(h / tileSize);

  // Compute CDF for each tile
  var cdfs = [];
  for (var ty = 0; ty < tilesY; ty++) {
    for (var tx = 0; tx < tilesX; tx++) {
      var hist = new Int32Array(256);
      var startX = tx * tileSize, startY = ty * tileSize;
      var endX = Math.min(startX + tileSize, w), endY = Math.min(startY + tileSize, h);
      for (var y = startY; y < endY; y++) {
        for (var x = startX; x < endX; x++) { hist[Math.round(src[y * w + x])]++; }
      }
      var total = (endX - startX) * (endY - startY);
      var clipValue = Math.round(clipLimit * total / 256);
      var excess = 0;
      for (var i = 0; i < 256; i++) { if (hist[i] > clipValue) { excess += hist[i] - clipValue; hist[i] = clipValue; } }
      var redist = Math.floor(excess / 256);
      for (var i = 0; i < 256; i++) hist[i] += redist;

      var cdf = new Float32Array(256);
      var sum = 0;
      for (var i = 0; i < 256; i++) { sum += hist[i]; cdf[i] = sum; }
      var cdfMin = cdf[0], cdfRange = sum - cdfMin;
      for (var i = 0; i < 256; i++) cdf[i] = cdfRange > 0 ? (cdf[i] - cdfMin) / cdfRange * 255 : 0;
      cdfs.push(cdf);
    }
  }

  // Interpolate
  var result = new Float32Array(w * h);
  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      var tx = Math.floor(x / tileSize);
      var ty = Math.floor(y / tileSize);
      if (tx >= tilesX - 1) tx = tilesX - 2;
      if (ty >= tilesY - 1) ty = tilesY - 2;
      var px = (x - tx * tileSize) / tileSize;
      var py = (y - ty * tileSize) / tileSize;
      px = Math.max(0, Math.min(1, px));
      py = Math.max(0, Math.min(1, py));
      var val = Math.round(src[y * w + x]);
      var idxTL = ty * tilesX + tx;
      var idxTR = ty * tilesX + (tx + 1);
      var idxBL = (ty + 1) * tilesX + tx;
      var idxBR = (ty + 1) * tilesX + (tx + 1);
      result[y * w + x] = cdfs[idxTL][val] * (1-px) * (1-py) + cdfs[idxTR][val] * px * (1-py) + cdfs[idxBL][val] * (1-px) * py + cdfs[idxBR][val] * px * py;
    }
  }
  return result;
}

// ---- Gaussian kernel generation ----
function generateGaussianKernel(radius) {
  var size = radius * 2 + 1;
  var kernel = new Float32Array(size);
  var sigma = radius / 2;
  var sum = 0;
  for (var i = 0; i < size; i++) {
    var x = i - radius;
    kernel[i] = Math.exp(-(x * x) / (2 * sigma * sigma));
    sum += kernel[i];
  }
  for (var i = 0; i < size; i++) kernel[i] /= sum;
  return kernel;
}

// ---- 1D convolution (separable) ----
function convolutionFloat(src, w, h, kernel, radius) {
  var dst = new Float32Array(w * h);
  // Horizontal
  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      var sum = 0;
      for (var k = -radius; k <= radius; k++) {
        var px = x + k;
        if (px >= 0 && px < w) sum += src[y * w + px] * kernel[k + radius];
        else sum += src[y * w + x] * kernel[k + radius]; // edge clamp
      }
      dst[y * w + x] = sum;
    }
  }
  // Vertical
  var result = new Float32Array(w * h);
  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      var sum = 0;
      for (var k = -radius; k <= radius; k++) {
        var py = y + k;
        if (py >= 0 && py < h) sum += dst[py * w + x] * kernel[k + radius];
        else sum += dst[y * w + x] * kernel[k + radius];
      }
      result[y * w + x] = sum;
    }
  }
  return result;
}

// ---- Median filter for chrominance (noise reduction) ----
function medianFilterChroma(d, w, h, radius) {
  var r = Math.floor(radius / 2) || 1;
  var len = w * h;
  for (var y = 1; y < h - 1; y++) {
    for (var x = 1; x < w - 1; x++) {
      var idx = (y * w + x) * 4;
      // Compute local mean of chroma instead of median (faster, good enough)
      var sumR = 0, sumB = 0, count = 0;
      for (var ky = -r; ky <= r; ky++) {
        for (var kx = -r; kx <= r; kx++) {
          var pi = ((y + ky) * w + (x + kx)) * 4;
          sumR += d[pi]; sumB += d[pi+2]; count++;
        }
      }
      // Blend original with local mean for chroma only (preserve luminance edge)
      var blend = 0.33;
      d[idx] = d[idx] * (1-blend) + (sumR / count) * blend;
      d[idx+2] = d[idx+2] * (1-blend) + (sumB / count) * blend;
    }
  }
}

// ============================================================
// EXPORT
// ============================================================
function saveResult() {
  var fullW = croppedImage.width, fullH = croppedImage.height;
  var finalC = document.createElement('canvas');
  finalC.width = fullW; finalC.height = fullH;
  var fCtx = finalC.getContext('2d');
  fCtx.imageSmoothingQuality = 'high';
  fCtx.imageSmoothingEnabled = false;
  fCtx.drawImage(croppedImage, 0, 0, fullW, fullH);

  if (currentFilter === 'magic') {
    magicColorPipeline(fCtx, fullW, fullH);
  }

  finalC.toBlob(function(blob) {
    processedBlob = blob;
    var url = URL.createObjectURL(blob);
    document.getElementById('finalImage').src = url;
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step3').classList.remove('hidden');
  }, 'image/jpeg', 0.95);
}

function downloadAs(format) {
  if (!processedBlob) return;
  var mime = format === 'png' ? 'image/png' : 'image/jpeg';
  var ext = format === 'png' ? 'png' : 'jpg';
  var blob = processedBlob;
  if (format === 'png') {
    // Re-encode as PNG
    var img = new Image();
    img.onload = function() {
      var c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      var ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      c.toBlob(function(pngBlob) {
        downloadBlob(pngBlob, 'scanned_document.' + ext);
      }, 'image/png');
    };
    img.src = URL.createObjectURL(blob);
  } else {
    downloadBlob(blob, 'scanned_document.' + ext);
  }
}

function downloadBlob(blob, fileName) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function uploadScan() {
  if (!processedBlob) { document.getElementById('scanError').textContent = 'No processed image.'; return; }

  var ext = (activeFile && activeFile.name) ? activeFile.name.split('.').pop() : 'jpg';
  var fileName = 'scanned_' + Date.now() + '.' + (ext === 'png' ? 'png' : 'jpg');
  var mime = ext === 'png' ? 'image/png' : 'image/jpeg';
  var file = new File([processedBlob], fileName, { type: mime });

  var formData = new FormData();
  formData.append('customerName', 'Scanner User');
  formData.append('printType', 'color');
  formData.append('printSide', 'single');
  formData.append('paymentMethod', 'cash');
  formData.append('files', file);

  var btn = document.querySelector('#step3 .btn-primary');
  btn.disabled = true;
  btn.textContent = 'Uploading...';

  fetch('/api/upload', { method: 'POST', body: formData })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { document.getElementById('scanError').textContent = data.error; btn.disabled = false; btn.textContent = 'Upload to Print Store'; return; }
      window.location.href = '/?scan=done';
    })
    .catch(function() {
      document.getElementById('scanError').textContent = 'Upload failed.';
      btn.disabled = false;
      btn.textContent = 'Upload to Print Store';
    });
}

function backToStep1() {
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
}

function resetScanner() {
  sourceImage = null;
  croppedImage = null;
  processedBlob = null;
  activeFile = null;
  currentFilter = 'magic';
  rotation = 0;
  corners = null;
  wipMagicData = null;
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('cropContainer').classList.add('hidden');
  document.getElementById('uploadArea').classList.remove('hidden');
  document.getElementById('scanInput').value = '';
  document.getElementById('scanError').textContent = '';
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.filter-btn[data-filter="magic"]').classList.add('active');
}
