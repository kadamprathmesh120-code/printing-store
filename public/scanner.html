<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Document Scanner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="scanner-body">

<div id="app">

  <!-- Step 1: Upload -->
  <div id="step1" class="scanner-step">
    <div class="scanner-header">
      <h1>Document Scanner</h1>
    </div>
    <div id="uploadArea" class="upload-area">
      <label for="scanInput" class="upload-label">
        <div class="upload-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p>Upload a document photo</p>
        <small>JPG or PNG — the scanner detects edges, corrects perspective, and enhances quality</small>
      </label>
      <input type="file" id="scanInput" accept="image/*" hidden>
    </div>
    <div id="scanProgress" class="hidden" style="text-align:center;padding:40px 16px;color:#9ca3af;">
      <div class="rpc-spinner" style="margin:0 auto 12px;"></div>
      <div>Scanning document...</div>
      <small style="color:#6b7280;">Detecting edges, correcting perspective, enhancing</small>
    </div>
    <div id="scanError" class="hidden" style="text-align:center;padding:20px 16px;color:#ef4444;"></div>
  </div>

  <!-- Step 2: Enhance & Compare -->
  <div id="step2" class="scanner-step hidden">
    <div class="scanner-header">
      <button class="back-btn" onclick="backToStep1()">&larr; Back</button>
      <h1>Enhance</h1>
    </div>
    <div class="preview-container" id="previewContainer">
      <img id="previewImg" class="result-img" style="display:block;width:100%;">
      <div class="badge-overlay" id="modeBadge">Magic Color</div>
      <div class="compare-hint" id="compareHint">&#9679; Hold to compare</div>
    </div>
    <div class="filter-strip" id="filterStrip">
      <button class="filter-btn" data-mode="original" onclick="setMode('original', this)">Original</button>
      <button class="filter-btn" data-mode="auto" onclick="setMode('auto', this)">Auto</button>
      <button class="filter-btn active" data-mode="magic_color" onclick="setMode('magic_color', this)">Magic Color</button>
      <button class="filter-btn" data-mode="grayscale" onclick="setMode('grayscale', this)">Grayscale</button>
      <button class="filter-btn" data-mode="black_white" onclick="setMode('black_white', this)">B&W</button>
    </div>
    <div class="action-bar scan-action-bar">
      <button class="tool-btn" onclick="backToStep1()">&larr; Back</button>
      <button class="tool-btn confirm-btn" onclick="goToExport()" style="flex:2;">Save &rarr;</button>
    </div>
  </div>

  <!-- Step 3: Export -->
  <div id="step3" class="scanner-step hidden">
    <div class="scanner-header">
      <h1>Scan Complete</h1>
    </div>
    <div class="result-container">
      <img id="finalImage" class="result-img">
    </div>
    <div class="export-section">
      <button class="btn btn-primary" onclick="downloadAs('jpeg')">Download JPEG</button>
      <button class="btn btn-secondary" onclick="downloadAs('png')">Download PNG</button>
      <button class="btn btn-success" onclick="uploadScan()">Upload to Print Store</button>
      <button class="btn btn-secondary" onclick="resetScanner()">Scan Another</button>
      <div id="uploadError" class="error" style="text-align:center;"></div>
    </div>
  </div>
</div>

<style>
.scanner-body { background:#121220; color:#fff; min-height:100vh; overscroll-behavior:none; }
.scanner-step { max-width:520px; margin:0 auto; padding:0 0 24px; }
.scanner-header { display:flex; align-items:center; gap:10px; padding:14px 16px; background:#1a1a2e; border-bottom:1px solid #2a2a3e; position:sticky; top:0; z-index:10; }
.scanner-header h1 { font-size:1.1em; margin:0; flex:1; font-weight:700; }
.back-btn { background:none; border:none; color:#fff; font-size:1.1em; cursor:pointer; padding:4px 8px; }

.upload-area { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:320px; background:#1a1a2e; border:2px dashed #2a2a3e; border-radius:16px; margin:16px; cursor:pointer; transition:all .2s; }
.upload-area:active { border-color:#1a73e8; background:#1e1e32; }
.upload-label { display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; width:100%; padding:40px 20px; }
.upload-icon { width:64px; height:64px; border-radius:50%; background:rgba(26,115,232,0.12); display:flex; align-items:center; justify-content:center; }
.upload-area p { font-size:1.1em; color:#1a73e8; margin:4px 0 0; font-weight:600; }
.upload-area small { color:#6b7280; text-align:center; max-width:280px; line-height:1.4; }

#previewContainer { margin:8px; border-radius:10px; overflow:hidden; background:#000; position:relative; display:flex; justify-content:center; min-height:200px; }
#previewContainer img { display:block; max-width:100%; max-height:70vh; }
.badge-overlay { position:absolute; top:10px; right:10px; background:rgba(22,163,74,0.85); color:#fff; padding:4px 12px; border-radius:16px; font-size:0.72em; font-weight:700; pointer-events:none; transition:opacity .2s; }
.compare-hint { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.6); color:#fff; padding:4px 12px; border-radius:12px; font-size:0.68em; pointer-events:none; transition:opacity .3s; white-space:nowrap; }

.filter-strip { display:flex; gap:6px; padding:12px 16px; justify-content:center; overflow-x:auto; }
.filter-btn { flex:0 0 auto; padding:10px 16px; border-radius:12px; font-size:0.82em; font-weight:600; cursor:pointer; font-family:inherit; border:2px solid #2a2a3e; background:#1e1e32; color:#9ca3af; transition:all .2s; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
.filter-btn:active { transform:scale(0.97); }
.filter-btn.active { border-color:#16A34A; background:rgba(22,163,74,0.12); color:#16A34A; }

.scan-action-bar { display:flex; gap:10px; padding:10px 16px; }
.scan-action-bar .tool-btn { flex:1; padding:12px 20px; border-radius:10px; font-size:0.92em; cursor:pointer; font-family:inherit; background:#1e1e32; border:1px solid #2a2a3e; color:#fff; transition:all .15s; min-height:44px; -webkit-tap-highlight-color:transparent; }
.scan-action-bar .tool-btn:active { transform:scale(0.96); background:#2a2a3e; }
.scan-action-bar .tool-btn.confirm-btn { background:#16A34A; border-color:#16A34A; font-weight:700; }

.result-container { margin:12px 16px; border-radius:10px; overflow:hidden; background:#000; display:flex; justify-content:center; }
.result-img { max-width:100%; display:block; }
.export-section { padding:0 16px 24px; display:flex; flex-direction:column; gap:10px; }
.export-section .btn { margin:0; }

.rpc-spinner { display:inline-block; width:24px; height:24px; border:3px solid rgba(255,255,255,0.15); border-top-color:#1a73e8; border-radius:50%; animation:rpc-spin .6s linear infinite; }
@keyframes rpc-spin { to { transform:rotate(360deg); } }
.hidden { display:none !important; }

@media (max-width:480px) {
  .upload-area { min-height:260px; margin:10px; }
  .filter-btn { padding:8px 12px; font-size:0.78em; }
  .filter-strip { padding:8px 10px; gap:4px; }
}
</style>

<script>
var SCANNER_API = 'http://localhost:8000';

var scanResult = null;
var activeMode = 'magic_color';
var processedBlob = null;
var activeFile = null;

// ---- Init ----
document.getElementById('scanInput').addEventListener('change', function(e) {
  if (e.target.files && e.target.files[0]) {
    activeFile = e.target.files[0];
    startScan(activeFile);
  }
});

// ---- Upload & Scan ----
function startScan(file) {
  document.getElementById('uploadArea').classList.add('hidden');
  document.getElementById('scanProgress').classList.remove('hidden');
  document.getElementById('scanError').classList.add('hidden');

  var fd = new FormData();
  fd.append('image', file);
  fd.append('include_all_modes', 'true');
  fd.append('include_pdf', 'false');

  fetch(SCANNER_API + '/scan', { method: 'POST', body: fd })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.detail || 'Scan failed'); });
      return r.json();
    })
    .then(function(data) {
      scanResult = data;
      document.getElementById('scanProgress').classList.add('hidden');
      showEnhance();
    })
    .catch(function(err) {
      document.getElementById('scanProgress').classList.add('hidden');
      document.getElementById('scanError').textContent = 'Scan failed: ' + err.message;
      document.getElementById('scanError').classList.remove('hidden');
      document.getElementById('uploadArea').classList.remove('hidden');
    });
}

// ---- Step 2: Enhance ----
function showEnhance() {
  activeMode = 'magic_color';
  document.getElementById('modeBadge').textContent = 'Magic Color';
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.filter-btn[data-mode="magic_color"]').classList.add('active');
  document.getElementById('previewImg').src = scanResult.magic_color || scanResult.processed;
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function setMode(mode, btn) {
  if (mode === activeMode) return;
  activeMode = mode;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  var label = { original:'Original', auto:'Auto', magic_color:'Magic Color', grayscale:'Grayscale', black_white:'B&W' };
  document.getElementById('modeBadge').textContent = label[mode] || mode;

  if (mode === 'original') document.getElementById('previewImg').src = scanResult.cropped;
  else if (mode === 'magic_color') document.getElementById('previewImg').src = scanResult.magic_color || scanResult.processed;
  else if (mode === 'grayscale' && scanResult.grayscale) document.getElementById('previewImg').src = scanResult.grayscale;
  else if (mode === 'black_white' && scanResult.black_white) document.getElementById('previewImg').src = scanResult.black_white;
  else document.getElementById('previewImg').src = scanResult.processed;
}

// Before/After: hold to compare
var previewContainer = document.getElementById('previewContainer');
previewContainer.addEventListener('mousedown', function() { if (activeMode !== 'original') showOriginal(); });
previewContainer.addEventListener('mouseup', function() { if (activeMode !== 'original') showProcessed(); });
previewContainer.addEventListener('mouseleave', function() { showProcessed(); });
previewContainer.addEventListener('touchstart', function(e) { if (activeMode !== 'original') { e.preventDefault(); showOriginal(); } }, { passive: false });
previewContainer.addEventListener('touchend', function(e) { showProcessed(); }, { passive: false });

var comparing = false;
function showOriginal() {
  if (comparing) return;
  comparing = true;
  document.getElementById('previewImg').src = scanResult.cropped;
  document.getElementById('modeBadge').textContent = 'Original (hold)';
  document.getElementById('compareHint').style.opacity = '0';
}
function showProcessed() {
  if (!comparing) return;
  comparing = false;
  setMode(activeMode, document.querySelector('.filter-btn.active'));
  document.getElementById('compareHint').style.opacity = '1';
}

// ---- Step 3: Export ----
function goToExport() {
  var mode = activeMode;
  var dataSrc = scanResult.cropped;
  if (mode === 'magic_color') dataSrc = scanResult.magic_color || scanResult.processed;
  else if (mode === 'grayscale' && scanResult.grayscale) dataSrc = scanResult.grayscale;
  else if (mode === 'black_white' && scanResult.black_white) dataSrc = scanResult.black_white;
  else dataSrc = scanResult.processed;

  // Convert base64 data URL to blob
  fetch(dataSrc)
    .then(function(r) { return r.blob(); })
    .then(function(blob) {
      processedBlob = blob;
      document.getElementById('finalImage').src = dataSrc;
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step3').classList.remove('hidden');
    });
}

function downloadAs(format) {
  if (!processedBlob) return;
  var mime = format === 'png' ? 'image/png' : 'image/jpeg';
  var ext = format === 'png' ? 'png' : 'jpg';
  if (format === 'png') {
    var img = new Image();
    img.onload = function() {
      var c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      c.toBlob(function(pngBlob) { downloadBlob(pngBlob, 'scanned_document.' + ext); }, 'image/png');
    };
    img.src = URL.createObjectURL(processedBlob);
  } else {
    downloadBlob(processedBlob, 'scanned_document.' + ext);
  }
}

function downloadBlob(blob, name) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function uploadScan() {
  if (!processedBlob) { document.getElementById('uploadError').textContent = 'No processed image.'; return; }
  var ext = (activeFile && activeFile.name) ? activeFile.name.split('.').pop() : 'jpg';
  var fileName = 'scanned_' + Date.now() + '.' + (ext === 'png' ? 'png' : 'jpg');
  var mime = ext === 'png' ? 'image/png' : 'image/jpeg';
  var file = new File([processedBlob], fileName, { type: mime });

  var fd = new FormData();
  fd.append('customerName', 'Scanner User');
  fd.append('printType', 'color');
  fd.append('printSide', 'single');
  fd.append('paymentMethod', 'razorpay');
  fd.append('files', file);

  var btn = document.querySelector('#step3 .btn-success');
  btn.disabled = true;
  btn.textContent = 'Uploading...';

  fetch('/api/upload', { method: 'POST', body: fd })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { document.getElementById('uploadError').textContent = data.error; btn.disabled = false; btn.textContent = 'Upload to Print Store'; return; }
      window.location.href = '/?scan=done';
    })
    .catch(function() {
      document.getElementById('uploadError').textContent = 'Upload failed.';
      btn.disabled = false;
      btn.textContent = 'Upload to Print Store';
    });
}

// ---- Navigation ----
function backToStep1() {
  scanResult = null;
  processedBlob = null;
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('uploadArea').classList.remove('hidden');
  document.getElementById('scanInput').value = '';
  document.getElementById('scanError').classList.add('hidden');
  document.getElementById('uploadError').textContent = '';
}

function resetScanner() {
  scanResult = null;
  processedBlob = null;
  activeFile = null;
  activeMode = 'magic_color';
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('uploadArea').classList.remove('hidden');
  document.getElementById('scanInput').value = '';
  document.getElementById('scanError').classList.add('hidden');
  document.getElementById('uploadError').textContent = '';
}
</script>
</body>
</html>
